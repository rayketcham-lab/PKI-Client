name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-prefix: clippy
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  clippy-pqc:
    name: Clippy (PQC)
    needs: [fmt]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-prefix: clippy-pqc
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo clippy --features pqc
        run: cargo clippy --all-targets --features pqc -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: test
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo test
        run: cargo test --all

  test-pqc:
    name: Test (PQC)
    needs: [fmt, clippy-pqc]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: test-pqc
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo test --features pqc
        run: cargo test --all --features pqc

  build:
    name: Build
    needs: [fmt, clippy]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: build
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: cargo build --release
        run: cargo build --release
      - name: Verify pki binary
        run: |
          if [ ! -f "target/release/pki" ]; then
            echo "ERROR: pki binary not found"
            exit 1
          fi
          echo "OK: pki ($(du -h target/release/pki | cut -f1))"

  build-musl:
    name: Build (musl static)
    needs: [fmt, clippy]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          targets: x86_64-unknown-linux-musl
          cache-prefix: build-musl
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y musl-tools
          fi
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Verify static linking
        run: |
          if ldd "target/x86_64-unknown-linux-musl/release/pki" 2>&1 | grep -q "not a dynamic"; then
            echo "OK: pki is statically linked"
          else
            echo "WARN: pki may not be fully static"
          fi

  audit:
    name: Security Audit
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: audit
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Install cargo-audit
        run: which cargo-audit || cargo install cargo-audit --locked
      - name: Run cargo audit
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          for i in 1 2 3; do
            if cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0398; then
              break
            fi
            echo "Retry $i: advisory database fetch failed, retrying..."
            sleep 5
          done

  cargo-deny:
    name: Dependency Audit (cargo-deny)
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: deny
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Install cargo-deny
        run: which cargo-deny || cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check
