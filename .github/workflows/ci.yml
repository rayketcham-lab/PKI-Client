name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-contained:
    name: Self-Contained Check
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: self-contained
      - name: Reject git dependencies
        run: |
          # Use cargo metadata for authoritative dependency source checking.
          # This cannot be bypassed with string tricks unlike grep-based approaches.
          GIT_DEPS=$(cargo metadata --format-version 1 2>/dev/null \
            | python3 -c "
          import json, sys
          meta = json.load(sys.stdin)
          git_deps = []
          for p in meta['packages']:
              src = p.get('source') or ''
              if src.startswith('git+'):
                  git_deps.append(p['name'] + ' (' + src + ')')
          for d in git_deps:
              print(d)
          sys.exit(1 if git_deps else 0)
          ")
          if [ $? -ne 0 ]; then
            echo ""
            echo "ERROR: Found git-sourced dependencies:"
            echo "$GIT_DEPS"
            echo ""
            echo "All external dependencies must be vendored under vendor/ or published to crates.io."
            echo "See: https://github.com/rayketcham-lab/PKI-Client/issues/5 (self-contained build policy)"
            exit 1
          fi
          echo "OK: All dependencies are from crates.io or local paths — build is fully self-contained."

  fmt:
    name: Format
    needs: [self-contained]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-prefix: clippy

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  clippy-pqc:
    name: Clippy (PQC)
    needs: [fmt]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-prefix: clippy-pqc

      - name: cargo clippy --features pqc
        run: cargo clippy --all-targets --features pqc -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: test

      - name: cargo test
        run: cargo test --all

  test-pqc:
    name: Test (PQC)
    needs: [fmt, clippy-pqc]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: test-pqc

      - name: cargo test --features pqc
        run: cargo test --all --features pqc

  build:
    name: Build
    needs: [fmt, clippy]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: build

      - name: cargo build --release
        run: cargo build --release
      - name: Verify pki binary
        run: |
          if [ ! -f "target/release/pki" ]; then
            echo "ERROR: pki binary not found"
            exit 1
          fi
          echo "OK: pki ($(du -h target/release/pki | cut -f1))"

  build-musl:
    name: Build (musl static)
    needs: [fmt, clippy]
    # Pinned to ubuntu3-runner: musl-tools not available on Rocky Linux
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          targets: x86_64-unknown-linux-musl
          cache-prefix: build-musl

      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y musl-tools
          fi
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Verify static linking
        run: |
          if ldd "target/x86_64-unknown-linux-musl/release/pki" 2>&1 | grep -q "not a dynamic"; then
            echo "OK: pki is statically linked"
          else
            echo "WARN: pki may not be fully static"
          fi

  links:
    name: Link Check
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install lychee
        run: which lychee || cargo install lychee --locked
      - name: Check markdown links
        run: |
          lychee \
            --no-progress \
            --exclude 'img.shields.io' \
            --exclude 'github.com/rayketcham-lab/PKI-Client/releases$' \
            '**/*.md'

  audit:
    name: Security Audit
    needs: [self-contained]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: audit

      - name: Install cargo-audit
        run: which cargo-audit || cargo install cargo-audit@0.22.1 --locked
      - name: Run cargo audit
        env:
          GITHUB_TOKEN: ""
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          AUDIT_OK=false
          for i in 1 2 3; do
            if cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0398; then
              AUDIT_OK=true
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          if [ "$AUDIT_OK" != "true" ]; then
            echo "ERROR: cargo audit failed after 3 attempts"
            exit 1
          fi

  cargo-deny:
    name: Dependency Audit (cargo-deny)
    needs: [self-contained]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: deny

      - name: Install cargo-deny
        run: |
          # Pinned to 0.16.2: newer versions require GLIBC_2.39 (unavailable on Rocky Linux runners)
          NEED_INSTALL=true
          if command -v cargo-deny &> /dev/null; then
            INSTALLED=$(cargo-deny --version 2>/dev/null | grep -oP '[\d.]+' | head -1)
            if [ "$INSTALLED" = "0.16.2" ]; then
              NEED_INSTALL=false
            fi
          fi
          if [ "$NEED_INSTALL" = "true" ]; then
            cargo install cargo-deny@0.16.2 --locked --force
          fi
      - name: Run cargo deny
        run: cargo deny check
