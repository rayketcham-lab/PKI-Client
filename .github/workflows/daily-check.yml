name: Daily Health Check

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC daily
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use CMake builder for aws-lc-sys to avoid __isoc23_sscanf (C23) unavailable on Rocky Linux GLIBC
  AWS_LC_SYS_CMAKE_BUILDER: 1

concurrency:
  group: daily-check
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Feature permutations — test every supported feature combination
  # ──────────────────────────────────────────────────────────────────
  feature-matrix:
    name: Features (${{ matrix.name }})
    # Pin to ubuntu3-runner: fips tests fail on Rocky due to GLIBC/Ed25519 KAT
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ""
          - name: pqc
            features: "--features pqc"
          - name: fips
            features: "--features fips"
            # FIPS entropy health check is non-deterministic — allow failure
            allow_failure: true
          - name: pqc+fips
            features: "--features pqc,fips"
            allow_failure: true
          - name: no-default
            features: "--no-default-features"
          - name: all-features
            features: "--all-features"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          cache-prefix: v3-daily-${{ matrix.name }}
      - name: Check compilation
        env:
          FEATURES: ${{ matrix.features }}
        run: cargo check --all-targets $FEATURES
      - name: Clippy
        env:
          FEATURES: ${{ matrix.features }}
        run: cargo clippy --all-targets $FEATURES -- -D warnings
      - name: Test
        env:
          FEATURES: ${{ matrix.features }}
        # Exclude gen-signing-certs: tool binary hits GLIBC_2.39 on older runners
        run: cargo test --workspace --exclude gen-signing-certs $FEATURES

  # ──────────────────────────────────────────────────────────────────
  # MSRV — ensure minimum supported Rust version still compiles
  # ──────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.88.0) ${{ matrix.name }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ""
          - name: pqc
            features: "--features pqc"
          - name: fips
            features: "--features fips"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install MSRV toolchain
        run: |
          rustup install 1.88.0
          rustup default 1.88.0
      - name: Check MSRV compilation
        env:
          FEATURES: ${{ matrix.features }}
        run: cargo check --all $FEATURES

  # ──────────────────────────────────────────────────────────────────
  # Security — advisory database and dependency audit
  # ──────────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: v3-daily-audit
      - name: Install audit tools
        run: |
          # Build from source if cached binaries are missing or broken (GLIBC compat)
          if ! cargo-audit --version >/dev/null 2>&1; then
            cargo install cargo-audit --locked --force
          fi
          # Require cargo-deny >= 0.17 for CVSS 4.0 advisory DB support
          NEED_DENY=true
          if cargo-deny --version >/dev/null 2>&1; then
            VER=$(cargo-deny --version | grep -oP '\d+\.\d+' | head -1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            if [ "$MINOR" -ge 17 ]; then
              NEED_DENY=false
            fi
          fi
          if [ "$NEED_DENY" = "true" ]; then
            cargo install cargo-deny --locked --force
          fi
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0398
      - name: cargo deny
        run: cargo deny check

  # ──────────────────────────────────────────────────────────────────
  # Documentation — ensure docs build without warnings
  # ──────────────────────────────────────────────────────────────────
  doc-build:
    name: Documentation
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: v3-daily-docs
      - name: Build documentation
        run: |
          # Exclude vendored spork-core (has doc link warnings from bracket syntax in comments)
          cargo doc --no-deps \
            -p pki-client \
            -p pki-client-output \
            -p pki-probe \
            -p pki-hierarchy

  # ──────────────────────────────────────────────────────────────────
  # Binary size tracking — catch unexpected bloat
  # ──────────────────────────────────────────────────────────────────
  binary-size:
    name: Binary Size
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: v3-daily-size
      - name: Build release binary
        run: cargo build --release
      - name: Report binary size
        run: |
          SIZE=$(stat --printf="%s" target/release/pki)
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE / 1048576}")
          echo "## Binary Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Binary | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| pki (release) | ${SIZE_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
          # Fail if binary exceeds 50 MB (sanity check for unexpected bloat)
          if [ "$SIZE" -gt 52428800 ]; then
            echo "ERROR: Binary size ${SIZE_MB} MB exceeds 50 MB threshold"
            exit 1
          fi
          echo "OK: pki binary is ${SIZE_MB} MB"

  # ──────────────────────────────────────────────────────────────────
  # Dependency freshness — check for outdated deps
  # ──────────────────────────────────────────────────────────────────
  dependency-freshness:
    name: Dependency Freshness
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: v3-daily-outdated
      - name: Install cargo-outdated
        run: |
          if ! cargo-outdated --version >/dev/null 2>&1; then
            cargo install cargo-outdated --locked --force
          fi
      - name: Check outdated dependencies
        run: |
          echo "## Dependency Freshness Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo outdated --root-deps-only 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Advisory only — does not fail the build
