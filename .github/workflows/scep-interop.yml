name: SCEP Enrollment Interop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/pki-client/src/scep/**'
      - 'tests/interop/scep*'
      - '.github/workflows/scep-interop.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use CMake builder for aws-lc-sys to avoid __isoc23_sscanf (C23) unavailable on Rocky Linux GLIBC
  AWS_LC_SYS_CMAKE_BUILDER: 1

concurrency:
  group: scep-interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scep-interop:
    name: SCEP Enrollment Interop
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: v1-scep-interop

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary exists
        run: |
          set -euo pipefail
          if [ ! -f "target/release/pki" ]; then
            echo "ERROR: pki binary not found at target/release/pki"
            exit 1
          fi
          echo "OK: pki binary present ($(du -h target/release/pki | cut -f1))"

      - name: Run SCEP interop tests
        env:
          FAILURE_LOG: /tmp/scep-interop-failures.log
        run: |
          set -euo pipefail
          bash tests/interop/scep_enroll.sh ./target/release/pki

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: scep-interop-results
          path: /tmp/scep-interop-failures.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="ci: SCEP interop failure on $(date -u '+%Y-%m-%d')"
          existing=$(gh issue list --label scep-interop-failure --state open --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "Another failure detected. See run: ${RUN_URL}"
          else
            failures_text=$(cat /tmp/scep-interop-failures.log 2>/dev/null || echo 'See workflow logs for details')
            run_date=$(date -u)
            body="$(cat <<ISSUE_EOF
          ## SCEP Enrollment Interop Failure

          The automated SCEP enrollment interop tests failed.

          **Run:** ${RUN_URL}
          **Date:** ${run_date}

          ### Failures
          ${failures_text}

          ### Action Required
          Investigate and fix the failing tests. This issue will be auto-closed when tests pass.
          ISSUE_EOF
            )"
            gh issue create --title "$title" --label scep-interop-failure --body "$body"
          fi

      - name: Close resolved issues
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          issues=$(gh issue list --label scep-interop-failure --state open --json number --jq '.[].number')
          for num in $issues; do
            gh issue close "$num" --comment "SCEP interop tests are passing again. Auto-closing."
          done
