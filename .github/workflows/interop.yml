name: Interop Tests

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily (well after daily-check at 02:30)
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/pki-client/src/commands/probe.rs'
      - 'crates/pki-probe/**'
      - 'vendor/spork-core/**'
      - 'tests/interop/**'
      - '**/Cargo.toml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  AWS_LC_SYS_CMAKE_BUILDER: 1

concurrency:
  group: interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: interop
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pki-binary
          path: target/release/pki
          retention-days: 1

  tls-probe:
    name: TLS Probe
    needs: [build]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run TLS probe interop tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/tls_probe.sh

  cert-roundtrip:
    name: Certificate Round-Trip
    needs: [build]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run certificate round-trip tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/cert_roundtrip.sh
