name: Interop Tests

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily (well after daily-check at 02:30)
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/pki-client/src/commands/probe.rs'
      - 'crates/pki-probe/**'
      - 'vendor/spork-core/**'
      - 'tests/interop/**'
      - '**/Cargo.toml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  AWS_LC_SYS_CMAKE_BUILDER: 1

concurrency:
  group: interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          targets: x86_64-unknown-linux-musl
          cache-prefix: interop-musl
      - name: Install musl toolchain
        run: |
          if ! command -v musl-gcc &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y musl-tools
          fi
      # Build musl-static so the artifact runs on any downstream runner regardless
      # of glibc version. Previously shipped a glibc-dynamic binary that failed on
      # Rocky runners with older libc (`GLIBC_2.38 not found`) — issue #68.
      - name: Build release binary (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl -p pki-client
      - name: Verify static linking
        run: |
          if ldd target/x86_64-unknown-linux-musl/release/pki 2>&1 | grep -q "not a dynamic"; then
            echo "OK: statically linked"
          else
            echo "ERROR: binary is not fully static"
            ldd target/x86_64-unknown-linux-musl/release/pki
            exit 1
          fi
      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pki-binary
          path: target/x86_64-unknown-linux-musl/release/pki
          retention-days: 1

  tls-probe:
    name: TLS Probe
    needs: [build]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run TLS probe interop tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/tls_probe.sh

  cert-roundtrip:
    name: Certificate Round-Trip
    needs: [build]
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run certificate round-trip tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/cert_roundtrip.sh
