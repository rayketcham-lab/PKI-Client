name: Interop Tests

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily (well after daily-check at 02:30)
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/pki-client/src/acme/**'
      - 'crates/pki-client/src/est/**'
      - 'crates/pki-client/src/commands/acme/**'
      - 'crates/pki-client/src/commands/est.rs'
      - 'crates/pki-client/src/commands/probe.rs'
      - 'crates/pki-probe/**'
      - 'vendor/spork-core/**'
      - 'tests/interop/**'
      - '**/Cargo.toml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use CMake builder for aws-lc-sys to avoid __isoc23_sscanf (C23) unavailable on Rocky Linux GLIBC
  AWS_LC_SYS_CMAKE_BUILDER: 1

concurrency:
  group: interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Build pki binary for interop tests
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    # Pin to ubuntu3-runner: binary must match GLIBC of consuming jobs
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          cache-prefix: interop
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: pki-binary
          path: target/release/pki
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────
  # Docker availability check — warn visibly if HAS_DOCKER is unset
  # ──────────────────────────────────────────────────────────────────
  docker-check:
    name: Docker Available
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 1
    steps:
      - name: Check HAS_DOCKER variable
        env:
          HAS_DOCKER_VAR: ${{ vars.HAS_DOCKER }}
        run: |
          if [ "$HAS_DOCKER_VAR" != "true" ]; then
            echo "::warning::HAS_DOCKER is not set to 'true' — Pebble ACME tests will be SKIPPED. Set the repository variable HAS_DOCKER=true to enable."
          else
            echo "OK: HAS_DOCKER=true — Pebble tests will run"
          fi

  # ──────────────────────────────────────────────────────────────────
  # ACME interop — test against Pebble (Let's Encrypt test server)
  # ──────────────────────────────────────────────────────────────────
  acme-pebble:
    name: ACME vs Pebble
    if: ${{ vars.HAS_DOCKER == 'true' }}
    needs: [build, docker-check]
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 15
    services:
      pebble:
        image: letsencrypt/pebble:latest
        env:
          PEBBLE_VA_NOSLEEP: 1
          PEBBLE_VA_ALWAYS_VALID: 1
        ports:
          - 14000:14000   # ACME directory
          - 15000:15000   # Management / OCSP
        options: >-
          --health-cmd "wget -q --no-check-certificate -O /dev/null https://localhost:14000/dir || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run ACME interop tests
        env:
          PKI_BIN: ./pki
          PEBBLE_URL: https://localhost:14000/dir
        run: bash tests/interop/acme_pebble.sh

  # ──────────────────────────────────────────────────────────────────
  # TLS probe interop — test against known public endpoints
  # ──────────────────────────────────────────────────────────────────
  tls-probe:
    name: TLS Probe
    needs: [build]
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run TLS probe interop tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/tls_probe.sh

  # ──────────────────────────────────────────────────────────────────
  # Certificate operations — round-trip testing
  # ──────────────────────────────────────────────────────────────────
  cert-roundtrip:
    name: Certificate Round-Trip
    needs: [build]
    runs-on: [self-hosted, Linux, ubuntu3-runner]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: pki-binary
      - name: Prepare binary
        run: chmod +x pki
      - name: Run certificate round-trip tests
        env:
          PKI_BIN: ./pki
        run: bash tests/interop/cert_roundtrip.sh
