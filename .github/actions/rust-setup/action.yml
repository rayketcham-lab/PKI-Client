name: 'Rust Setup'
description: 'Install Rust toolchain, components, configure caching and git auth'

inputs:
  components:
    description: 'Comma-separated rustup components (e.g. "rustfmt,clippy")'
    required: false
    default: ''
  targets:
    description: 'Comma-separated rustup targets (e.g. "x86_64-unknown-linux-musl")'
    required: false
    default: ''
  cache-prefix:
    description: 'Cache key prefix for isolation between job types'
    required: false
    default: 'default'
  cross-repo-token:
    description: 'Token for cross-repo git dependency access'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Clean stale cargo config
      shell: bash
      run: |
        if [ -f "$HOME/.cargo/config.toml" ]; then
          echo "Removing stale ~/.cargo/config.toml to prevent duplicate-key errors"
          rm -f "$HOME/.cargo/config.toml"
        fi

    - name: Install/update Rust stable toolchain
      shell: bash
      run: |
        if ! command -v rustup &> /dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        else
          rustup update stable
          rustup default stable
        fi

    - name: Install components
      if: inputs.components != ''
      shell: bash
      run: |
        IFS=',' read -ra COMPS <<< "${{ inputs.components }}"
        for comp in "${COMPS[@]}"; do
          rustup component add "$(echo "$comp" | xargs)"
        done

    - name: Install targets
      if: inputs.targets != ''
      shell: bash
      run: |
        IFS=',' read -ra TGTS <<< "${{ inputs.targets }}"
        for tgt in "${TGTS[@]}"; do
          rustup target add "$(echo "$tgt" | xargs)"
        done

    - name: Print toolchain info
      shell: bash
      run: |
        echo "::group::Rust Toolchain"
        rustc --version --verbose
        cargo --version
        echo "::endgroup::"

    - name: Configure git auth for cross-repo deps
      if: inputs.cross-repo-token != ''
      shell: bash
      env:
        CROSS_REPO_TOKEN: ${{ inputs.cross-repo-token }}
      run: |
        # Remove checkout-injected extraheaders
        git config --global --unset-all http.https://github.com/.extraheader 2>/dev/null || true
        git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
        # Purge ALL stale url.*.insteadOf entries from global config
        # (previous CI runs accumulated expired ghs_ tokens that shadow new entries)
        git config --global --get-regexp "url\..*\.insteadof" | awk '{print $1}' | while IFS= read -r key; do
          section="${key%.*}"
          git config --global --remove-section "$section" 2>/dev/null || true
        done
        # Set fresh auth URL (single entry, no stale competition)
        AUTH_URL="https://x-access-token:${CROSS_REPO_TOKEN}@github.com/"
        git config --global url."${AUTH_URL}".insteadOf "https://github.com/"
        git config --global --add url."${AUTH_URL}".insteadOf "ssh://git@github.com/"
        # Verify
        echo "insteadOf entries after cleanup:"
        git config --global --get-regexp "url.*insteadof" | wc -l

    - name: Configure cargo to use git CLI for fetches
      shell: bash
      env:
        CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      run: |
        echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

    - name: Cache cargo registry + build artifacts
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ inputs.cache-prefix }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.cache-prefix }}-
          ${{ runner.os }}-cargo-

    - name: Prune stale cargo caches
      shell: bash
      run: |
        # Remove any cached crate source dirs older than 14 days to prevent unbounded growth
        if [ -d "$HOME/.cargo/registry/src" ]; then
          find "$HOME/.cargo/registry/src" -maxdepth 1 -type d -mtime +14 -exec rm -rf {} + 2>/dev/null || true
        fi
