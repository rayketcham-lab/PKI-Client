name: 'Rust Setup'
description: 'Install Rust toolchain, components, and configure caching'

inputs:
  components:
    description: 'Comma-separated rustup components (e.g. "rustfmt,clippy")'
    required: false
    default: ''
  targets:
    description: 'Comma-separated rustup targets (e.g. "x86_64-unknown-linux-musl")'
    required: false
    default: ''
  cache-prefix:
    description: 'Cache key prefix for isolation between job types'
    required: false
    default: 'default'

runs:
  using: 'composite'
  steps:
    - name: Clean stale cargo config
      shell: bash
      run: |
        if [ -f "$HOME/.cargo/config.toml" ]; then
          echo "Removing stale ~/.cargo/config.toml to prevent duplicate-key errors"
          rm -f "$HOME/.cargo/config.toml"
        fi

    - name: Install/update Rust stable toolchain
      shell: bash
      run: |
        if ! command -v rustup &> /dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        else
          rustup update stable
          rustup default stable
        fi

    - name: Install components
      if: inputs.components != ''
      shell: bash
      run: |
        IFS=',' read -ra COMPS <<< "${{ inputs.components }}"
        for comp in "${COMPS[@]}"; do
          rustup component add "$(echo "$comp" | xargs)"
        done

    - name: Install targets
      if: inputs.targets != ''
      shell: bash
      run: |
        IFS=',' read -ra TGTS <<< "${{ inputs.targets }}"
        for tgt in "${TGTS[@]}"; do
          rustup target add "$(echo "$tgt" | xargs)"
        done

    - name: Print toolchain info
      shell: bash
      run: |
        echo "::group::Rust Toolchain"
        rustc --version --verbose
        cargo --version
        echo "::endgroup::"

    - name: Detect runner glibc
      id: glibc
      shell: bash
      run: |
        # Scope the cargo cache per-glibc so a newer-glibc runner's target/
        # (e.g. Ubuntu 24.04 w/ GLIBC 2.39) does not restore onto an older
        # runner (Rocky 9 w/ GLIBC 2.34) where pre-linked test binaries fail
        # with "GLIBC_2.39 not found".
        v="$(ldd --version 2>&1 | head -n1 | awk '{print $NF}')"
        echo "version=$v" >> "$GITHUB_OUTPUT"
        echo "runner glibc: $v"

    - name: Cache cargo registry + build artifacts
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-glibc${{ steps.glibc.outputs.version }}-cargo-${{ inputs.cache-prefix }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-glibc${{ steps.glibc.outputs.version }}-cargo-${{ inputs.cache-prefix }}-

    - name: Clean stale aws-lc-sys build scripts
      shell: bash
      run: |
        # Belt-and-suspenders: even with glibc-scoped cache keys, nuke any
        # aws-lc-sys build artifacts that might have slipped through.
        rm -rf target/debug/build/aws-lc-sys-* target/release/build/aws-lc-sys-* 2>/dev/null || true

    - name: Prune stale cargo caches
      shell: bash
      run: |
        # Remove any cached crate source dirs older than 14 days to prevent unbounded growth
        if [ -d "$HOME/.cargo/registry/src" ]; then
          find "$HOME/.cargo/registry/src" -maxdepth 1 -type d -mtime +14 -exec rm -rf {} + 2>/dev/null || true
        fi
