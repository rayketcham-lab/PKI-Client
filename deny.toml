# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# ============================================================================
# Advisories - Vulnerability database checking
# ============================================================================

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack: pki-client only uses RSA signing, not decryption" },
    { id = "RUSTSEC-2024-0398", reason = "sharks secret sharing bias: transitive via spork-core, not directly used" },
]
yanked = "warn"  # digest 0.11.1 yanked, transitive via spork-core PQC deps

# ============================================================================
# Licenses - Allowed and denied licenses
# ============================================================================

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "OpenSSL",
    "0BSD",
    "LicenseRef-BSL-1.1",
    "CDLA-Permissive-2.0",
]

private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# Bans - Crate bans and restrictions
# ============================================================================

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    { name = "sha1", wrappers = ["pki-client", "pki-client-output", "p12", "p12-keystore", "x509-cert", "spork-core"] },
    { name = "rust-crypto" },
    { name = "crypto" },
    { name = "failure" },
    { name = "error-chain" },
]

skip = [
    { name = "aead" },
    { name = "aes" },
    { name = "aes-gcm" },
    { name = "cipher" },
    { name = "ctr" },
    { name = "digest" },
    { name = "block-buffer" },
    { name = "bitflags" },
    { name = "hashbrown" },
    { name = "getrandom" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    { name = "cfg_aliases" },
    { name = "heck" },
    { name = "linux-raw-sys" },
    { name = "nix" },
    { name = "nom" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "syn" },
    { name = "winreg" },
    { name = "x509-parser" },
    { name = "socket2" },
    { name = "tower-http" },
]

skip-tree = []

# ============================================================================
# Sources - Allowed crate sources
# ============================================================================

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/rayketcham-lab/spork-ca-engine.git"]

[sources.allow-org]

# ============================================================================
# Output configuration
# ============================================================================

[output]
feature-depth = 1
